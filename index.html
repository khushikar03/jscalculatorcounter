<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator & Counter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="main-title">Calculator & Counter Dashboard</h1>

  <div class="dashboard">

    <!-- CALCULATOR -->
    <div class="card" id="calculator">
      <h2>Calculator</h2>
      <div class="display" id="display">0</div>
      <div class="buttons">
        <button class="btn clear" onclick="clearDisplay()">C</button>
        <button class="btn operator" onclick="appendToDisplay('%')">%</button>
        <button class="btn operator" onclick="deleteLast()">⌫</button>
        <button class="btn operator" onclick="appendToDisplay('/')">÷</button>

        <button class="btn" onclick="appendToDisplay('7')">7</button>
        <button class="btn" onclick="appendToDisplay('8')">8</button>
        <button class="btn" onclick="appendToDisplay('9')">9</button>
        <button class="btn operator" onclick="appendToDisplay('*')">×</button>

        <button class="btn" onclick="appendToDisplay('4')">4</button>
        <button class="btn" onclick="appendToDisplay('5')">5</button>
        <button class="btn" onclick="appendToDisplay('6')">6</button>
        <button class="btn operator" onclick="appendToDisplay('-')">−</button>

        <button class="btn" onclick="appendToDisplay('1')">1</button>
        <button class="btn" onclick="appendToDisplay('2')">2</button>
        <button class="btn" onclick="appendToDisplay('3')">3</button>
        <button class="btn operator" onclick="appendToDisplay('+')">+</button>

        <button class="btn zero" onclick="appendToDisplay('0')">0</button>
        <button class="btn" onclick="appendToDisplay('.')">.</button>
        <button class="btn equals" onclick="calculate()">=</button>
      </div>
    </div>

    <!-- COUNTER -->
    <div class="card" id="counter">
      <h2>Counter</h2>
      <div class="count-display" id="count">0</div>
      <div class="counter-buttons">
        <button class="btn decrement" onclick="decrement()">− Decrement</button>
        <button class="btn reset-btn" onclick="resetCounter()">Reset</button>
        <button class="btn increment" onclick="increment()">+ Increment</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
